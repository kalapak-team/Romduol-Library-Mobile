name: romduol_library
description: Romduol Library — Open-access digital book library inspired by Cambodian culture.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.14.0
  badges: ^3.1.2

  # File Handling
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.3
  open_filex: ^4.4.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^33.1.46

  # Localization
  easy_localization: ^3.0.7

  # Networking
  connectivity_plus: ^6.0.3

  # UI Polish
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.1.1
  infinite_scroll_pagination: ^4.0.0
  pull_to_refresh_flutter3: ^2.0.2

  # Serialization & Utils
  json_annotation: ^4.9.0
  intl: ^0.20.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  web:
    generate: true
    image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  # Fonts are loaded via google_fonts package at runtime
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
