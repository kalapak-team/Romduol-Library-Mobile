version: "3.9"

services:
  # ── Laravel PHP-FPM ──────────────────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: romduol_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../backend:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: romduol_library
      DB_USERNAME: romduol
      DB_PASSWORD: secret
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FILESYSTEM_DISK: public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - romduol

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: romduol_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ../backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - romduol

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: romduol_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: romduol_library
      POSTGRES_USER: romduol
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U romduol -d romduol_library"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - romduol

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: romduol_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - romduol

  # ── Adminer (PostgreSQL Dashboard) ─────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: romduol_adminer
    restart: unless-stopped
    ports:
      - "5051:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    depends_on:
      db:
        condition: service_healthy
    networks:
      - romduol

  # ── pgAdmin 4 (PostgreSQL GUI) ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: romduol_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@romduol.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - romduol

volumes:
  pgdata:
  redisdata:
  pgadmindata:

networks:
  romduol:
    driver: bridge
